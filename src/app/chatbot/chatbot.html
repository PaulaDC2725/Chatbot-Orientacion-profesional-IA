  <nav class="chat__tabs-bar" *ngIf="isSidebarOpen">

    <div class="chat__sidebar-top">
      <button class="chat__btn-close-sidebar" (click)="isSidebarOpen = false" title="Ocultar menú">
        ✕
      </button>

      <div class="chat__tabs-container">
        <div *ngFor="let tab of tabs" class="chat__tab" [ngClass]="{'chat__tab--active': tab.isActive}" (click)="selectTab(tab.id)">
          <span class="chat__tab-text">{{ tab.title }}</span>

          <button class="chat__tab-delete" (click)="deleteTab(tab.id, $event)" title="Cerrar chat">✕</button>
        </div>
      </div>
    </div>

    <button class="chat__btn-add-tab" (click)="createNewChat()" title="Nuevo Chat">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="margin-right: 8px;">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      Nuevo chat
    </button>

  </nav>

  <div class="chat__main">

    <header class="chat__header">
      <div class="chat__header-inner">
        <div class="chat__header-left">
          <button class="chat__btn-menu" *ngIf="!isSidebarOpen" (click)="isSidebarOpen = true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <img src="../../assets/images/logo_icon.png" alt="Logo Ean" class="chat__logo">
        </div>

        <div class="chat__titles">
          <h1 class="chat__title">OurChatbot: Orientador Profesional IA</h1>
        </div>
      </div>
    </header>

    <main class="chat__body" #scrollMe>
      <div class="chat__container">

        <div *ngFor="let message of messages" class="chat__message"
          [ngClass]="{'chat__message--bot': message.isBot, 'chat__message--user': !message.isBot}">

          <div *ngIf="message.isBot" class="chat__avatar chat__avatar--bot">🤖</div>

          <div class="chat__bubble"
            [ngClass]="{'chat__bubble--bot': message.isBot, 'chat__bubble--user': !message.isBot}">
            {{ message.text }}
          </div>

          <div *ngIf="!message.isBot" class="chat__avatar chat__avatar--user">👤</div>
        </div>

        <div *ngIf="isLoading" class="chat__message chat__message--bot">
          <div class="chat__avatar chat__avatar--bot">🤖</div>
          <div class="chat__bubble chat__bubble--bot chat__bubble--loading">
            <span class="typing-text">Escribiendo...</span>
          </div>
        </div>

      </div>
    </main>

    <footer class="chat__footer">
      <div class="chat__container">

        <div class="chat__input-wrapper" [ngClass]="{'chat__input-wrapper--disabled': isHistoryView}">

          <input type="text" class="chat__input"
            [placeholder]="isHistoryView ? 'Visualizando chat antiguo. Regresa al chat actual para escribir...' : 'Escribe tu inquietud sobre tu carrera y la IA aquí...'"
            [(ngModel)]="userInput" (keyup.enter)="sendMessage()" [disabled]="isHistoryView" />

          <button class="chat__btn-send" (click)="sendMessage()" [disabled]="isHistoryView">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>
        </div>

      </div>
    </footer>

    <footer class="chat__credits">
      <p>© 2026 Universidad Ean | Alejandra, Laura y Paula</p>
    </footer>
  </div>

</div>
